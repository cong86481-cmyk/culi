serviceType: web
region: singapore

services:
  - name: cfl-marketplace
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cfl-marketplace-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: cfl-marketplace-db
    plan: free
